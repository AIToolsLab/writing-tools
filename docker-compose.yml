services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LOG_SECRET=${LOG_SECRET}
      - POSTHOG_PROJECT_TOKEN=${POSTHOG_PROJECT_TOKEN:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://e.thoughtful-ai.com/}
      - BETTER_AUTH_ENABLED=${BETTER_AUTH_ENABLED:-false}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-}
      - BETTER_AUTH_TRUSTED_ORIGINS=${BETTER_AUTH_TRUSTED_ORIGINS:-}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - BETTER_AUTH_DEVICE_CLIENT_IDS=${BETTER_AUTH_DEVICE_CLIENT_IDS:-}
    restart: unless-stopped

  experiment:
    build:
      context: ./experiment
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-unknown}
        EXP_LOGS_GID: ${EXP_LOGS_GID:-1001}
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTHOG_PROJECT_TOKEN=${POSTHOG_PROJECT_TOKEN:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://e.thoughtful-ai.com/}
    restart: unless-stopped

networks:
  default:
    driver: bridge
