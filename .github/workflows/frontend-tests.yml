name: Frontend Tests

# Runs on every PR to main (and pushes to main) that touch the frontend, so a
# broken change is caught here instead of when a user opens Word. Also keeps the
# manual trigger for ad-hoc runs.
on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-tests.yml'
  workflow_dispatch:

# Least privilege: these jobs only need to read the repo to check it out.
# Artifact upload uses the separate ACTIONS_RUNTIME_TOKEN, not GITHUB_TOKEN,
# so it keeps working even with everything else scoped to none.
permissions:
  contents: read

defaults:
  run:
    working-directory: frontend

jobs:
  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test

  e2e:
    name: E2E tests (Playwright)
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # Pinned to match the installed @playwright/test version (1.60.0); bump both
    # together so the committed visual snapshots keep matching.
    container:
      image: mcr.microsoft.com/playwright:v1.60.0-noble
      options: --user 1001
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Build Frontend
        run: npm run build
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 30
