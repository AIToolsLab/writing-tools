name: Build experiment image

# Builds the experiment (Next.js study app) image and pushes it to GHCR on every
# push to main, tagged with the commit SHA. CD (in the Infrastructure_k8s_* repo)
# pins a deploy by reading main's current SHA and selecting that image tag.
#
on:
  push:
    branches:
      - main
    paths:
      - 'experiment/**'
      - '.github/workflows/build-experiment-image.yml'
  workflow_dispatch:

# Least privilege: read the repo to check it out, write packages to push to GHCR.
permissions:
  contents: read
  packages: write

# One image per commit on main (CD may pin an intermediate SHA), so don't cancel
# in-progress builds for the same ref.
concurrency:
  group: build-experiment-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Compute tags and labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/aitoolslab/writing-tools-experiment
          # Bare SHA tag is what CD pins to; latest is a convenience pointer.
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: ./experiment
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GIT_COMMIT is baked in as NEXT_PUBLIC_GIT_COMMIT so the running app
          # reports the commit it was built from; EXP_LOGS_GID matches the
          # chart/compose log-volume GID.
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            EXP_LOGS_GID=1001
          cache-from: type=gha
          cache-to: type=gha,mode=max
