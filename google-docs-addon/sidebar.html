<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing Tools</title>
  
  <!-- 
    This is the sidebar entry point for the Google Docs add-on.
    
    In development, it loads the React app from a local dev server.
    In production, this file should be replaced with a bundled version
    that includes all the React code inline.
  -->
  
  <style>
    /* Base styles while loading */
    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
    }
    
    #root {
      min-height: 100vh;
    }
    
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: #5f6368;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e8eaed;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .loading-text {
      margin-top: 16px;
      font-size: 14px;
    }
    
    .error-container {
      padding: 20px;
      color: #d93025;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="loading-container">
      <div class="loading-spinner"></div>
      <div class="loading-text">Loading Writing Tools...</div>
    </div>
  </div>
  
  <script>
    /**
     * Google Apps Script bridge.
     * This wraps google.script.run calls in Promises for easier use.
     */
    window.GoogleAppsScript = {
      /**
       * Wraps a google.script.run call in a Promise.
       * @param {string} functionName - The Apps Script function to call
       * @param {...any} args - Arguments to pass to the function
       * @returns {Promise} Resolves with the function result
       */
      run: function(functionName, ...args) {
        return new Promise((resolve, reject) => {
          google.script.run
            .withSuccessHandler(resolve)
            .withFailureHandler(reject)
            [functionName](...args);
        });
      },
      
      /**
       * Gets the document context (before cursor, selection, after cursor).
       */
      getDocContext: function() {
        return this.run('getDocContext');
      },
      
      /**
       * Selects a phrase in the document.
       */
      selectPhrase: function(phrase) {
        return this.run('selectPhrase', phrase);
      },
      
      /**
       * Inserts text at the cursor position.
       */
      insertTextAtCursor: function(text) {
        return this.run('insertTextAtCursor', text);
      },
      
      /**
       * Replaces the current selection with new text.
       */
      replaceSelection: function(newText) {
        return this.run('replaceSelection', newText);
      },
      
      /**
       * Gets the current user's email.
       */
      getCurrentUserEmail: function() {
        return this.run('getCurrentUserEmail');
      },
      
      /**
       * Stores a user property.
       */
      setUserProperty: function(key, value) {
        return this.run('setUserProperty', key, value);
      },
      
      /**
       * Gets a user property.
       */
      getUserProperty: function(key) {
        return this.run('getUserProperty', key);
      },

      /**
       * Gets the document ID of the active document.
       */
      getDocumentId: function() {
        return this.run('getDocumentId');
      },

      /**
       * Gets the title of the active document.
       */
      getDocumentName: function() {
        return this.run('getDocumentName');
      },

      /**
       * Gets all tabs in the document with their text content.
       */
      getAllTabs: function() {
        return this.run('getAllTabs');
      },

      /**
       * Finds the Nth occurrence of a phrase in a specific tab and selects it
       * (switches tab + highlights).
       */
      selectInTab: function(tabId, phrase, occurrenceIndex) {
        return this.run('selectInTab', tabId, phrase, occurrenceIndex);
      }
    };
    
    // Flag to indicate we're running in Google Docs
    window.RUNNING_IN_GOOGLE_DOCS = true;
  </script>
  
  <!--
    Load the React bundle from an EXTERNAL url (Apps Script can't run a huge
    inline script). The source is chosen by the DOCUMENT TITLE, so no emails are
    hard-coded:

      - title contains [dev]  -> show a picker (localhost / staging / prod) so a
                                 developer can choose which build to load
      - otherwise             -> load the production bundle automatically

    To develop, rename your test doc to include [dev], then pick a source:
    "localhost" needs `npm run dev-server:google-docs` running; "staging" is the
    latest merge to main; "prod" is the released version.
  -->
  <script>
    (function () {
      var DEV_MARKER = '[dev]';
      var SOURCES = {
        localhost: 'http://localhost:3001',
        staging: 'https://staging.thoughtful-ai.com/gdocs',
        prod: 'https://app.thoughtful-ai.com/gdocs'
      };

      function loadFrom(base) {
        document.getElementById('root').innerHTML =
          '<div class="loading-container"><div class="loading-spinner"></div>' +
          '<div class="loading-text">Loading Writing Tools…</div></div>';

        var link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = base + '/google-docs.css';
        document.head.appendChild(link);

        var s = document.createElement('script');
        s.src = base + '/google-docs.bundle.js';
        s.onerror = function () {
          document.getElementById('root').innerHTML =
            '<div class="error-container"><h3>Could not load Writing Tools</h3>' +
            '<p>Failed to load the app from <code>' + base + '</code>.</p></div>';
        };
        document.body.appendChild(s);
      }

      function showPicker() {
        var root = document.getElementById('root');
        root.innerHTML =
          '<div style="padding:20px;color:#202124;">' +
          '<p style="margin:0 0 12px;font-weight:600;">Dev mode — load Writing Tools from:</p>' +
          '<div id="srcButtons"></div></div>';
        var box = document.getElementById('srcButtons');
        Object.keys(SOURCES).forEach(function (key) {
          var b = document.createElement('button');
          b.textContent = key;
          b.style.cssText =
            'display:block;width:100%;margin:0 0 8px;padding:10px 12px;text-align:left;' +
            'border:1px solid #dadce0;border-radius:6px;background:#f8f9fa;cursor:pointer;' +
            'font-size:14px;color:#1a73e8;';
          b.onclick = function () { loadFrom(SOURCES[key]); };
          box.appendChild(b);
        });
      }

      window.GoogleAppsScript.getDocumentName()
        .then(function (name) {
          var isDev = (name || '').toLowerCase().indexOf(DEV_MARKER) !== -1;
          if (isDev) showPicker();
          else loadFrom(SOURCES.prod);
        })
        .catch(function () { loadFrom(SOURCES.prod); });
    })();
  </script>
  
  <!-- 
    PRODUCTION: The bundled React app code goes here.
    Run the build script to generate this:
    
    npm run build:google-docs
    
    This will inline all JS/CSS into this file.
