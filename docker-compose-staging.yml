services:
  frontend:
    ports:
      - "19573:80"
    environment:
      - NODE_ENV=production

  backend:
    ports: []
    environment:
      - PORT=5000
      - DEBUG=False
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - POSTHOG_PROJECT_TOKEN=${POSTHOG_PROJECT_TOKEN:-}
      - POSTHOG_HOST=${POSTHOG_HOST:-https://e.thoughtful-ai.com/}
    volumes:
      - /opt/thoughtful/staging-logs:/app/backend/logs

  experiment:
    ports:
      - "19574:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - /opt/thoughtful/staging-experiment-logs:/app/logs

networks:
  default:
    driver: bridge
